    // ==========================================
    // 2. 主應用程式元件
    // ==========================================
    function App() {
      const [currentTheme, setCurrentTheme] = useState(null);
      const [punchedHoles, setPunchedHoles] = useState({});
      const [activeQuestionIdx, setActiveQuestionIdx] = useState(null);

      const currentThemeData = THEMES.find(t => t.id === currentTheme);
      const currentQuestions = currentTheme ? QUESTIONS[currentTheme] : [];
      const currentThemePunched = currentTheme ? (punchedHoles[currentTheme] || Array(12).fill(false)) : Array(12).fill(false);

      const handleSelectTheme = (themeId) => {
        setCurrentTheme(themeId);
        if (!punchedHoles[themeId]) {
          setPunchedHoles(prev => ({ ...prev, [themeId]: Array(12).fill(false) }));
        }
      };

      const handlePunchHole = (index) => {
        if (currentThemePunched[index]) return; 
        setActiveQuestionIdx(index);
      };

      const markHolePunched = (index) => {
        setPunchedHoles(prev => {
          const newPunched = [...prev[currentTheme]];
          newPunched[index] = true;
          return { ...prev, [currentTheme]: newPunched };
        });
      };

      return (
        <div className="min-h-screen font-sans text-gray-800">
          <header className="bg-white shadow-sm p-3 md:p-4 sticky top-0 z-10 flex flex-col md:flex-row justify-between items-center gap-3 md:gap-4">
            <div className="flex flex-col md:flex-row justify-between items-center w-full gap-2">
              <div className="text-center md:text-left">
                <h1 className="text-2xl md:text-4xl font-bold text-blue-800 flex items-center justify-center md:justify-start gap-2 md:gap-3">
                  <span className="text-3xl md:text-5xl">🎯</span> ICOPE六力健康戳戳樂
                </h1>
                <p className="text-sm md:text-xl text-gray-500 mt-1 font-medium">長者內在能力檢測．趣味多元問答遊戲</p>
              </div>
              <div className="text-xs md:text-base font-bold text-gray-400 bg-gray-50 px-3 py-1 md:px-4 md:py-2 rounded-lg border border-gray-100 mt-2 md:mt-0 shadow-sm">
                設計者：愛迪樂 鍾孟修 職能治療師
              </div>
            </div>
            {currentTheme && (
              <button 
                onClick={() => setCurrentTheme(null)}
                className="w-full md:w-auto px-4 py-2 md:px-6 md:py-3 bg-gray-200 hover:bg-gray-300 rounded-xl font-bold text-base md:text-xl transition-colors shadow-sm whitespace-nowrap"
              >
                返回主選單
              </button>
            )}
          </header>

          <main className="p-4 max-w-6xl mx-auto mt-4 md:mt-8">
            {!currentTheme ? (
              <ThemeSelector onSelect={handleSelectTheme} punchedHoles={punchedHoles} />
            ) : (
              <PunchBoard 
                themeData={currentThemeData} 
                punchedState={currentThemePunched} 
                questions={currentQuestions}
                onPunch={handlePunchHole} 
              />
            )}
          </main>

          {activeQuestionIdx !== null && (
            <QuestionModal 
              themeColor={currentThemeData.color}
              questionData={currentQuestions[activeQuestionIdx]}
              onClose={() => {
                markHolePunched(activeQuestionIdx);
                setActiveQuestionIdx(null);
              }}
            />
          )}
        </div>
      );
    }

    // ==========================================
    // 3. 子元件：主題選擇器
    // ==========================================
    function ThemeSelector({ onSelect, punchedHoles }) {
      return (
        <div className="animate-fade-in">
          <h2 className="text-2xl md:text-3xl font-bold mb-8 text-center text-gray-700">請選擇一個健康主題開始遊戲</h2>
          <div className="grid grid-cols-2 md:grid-cols-3 gap-6 md:gap-8">
            {THEMES.map(theme => {
              const punchedCount = punchedHoles[theme.id] ? punchedHoles[theme.id].filter(Boolean).length : 0;
              const isComplete = punchedCount === 12;

              return (
                <button
                  key={theme.id}
                  onClick={() => onSelect(theme.id)}
                  className={`${theme.bgColor} border-4 border-transparent hover:border-${theme.color.split('-')[1]}-400 rounded-[2rem] p-8 shadow-md hover:shadow-xl transition-all transform hover:-translate-y-1 flex flex-col items-center gap-4 relative overflow-hidden`}
                >
                  {isComplete && (
                    <div className="absolute top-0 right-0 bg-green-500 text-white text-base md:text-lg px-4 py-2 rounded-bl-xl font-bold">
                      已完成 🎉
                    </div>
                  )}
                  <div className={`text-6xl md:text-7xl ${isComplete ? 'opacity-50' : ''}`}>
                    {theme.icon}
                  </div>
                  <h3 className="text-2xl md:text-4xl font-bold mt-2">{theme.name}</h3>
                  <div className="w-full bg-white rounded-full h-4 mt-3 shadow-inner">
                    <div 
                      className={`${theme.color} h-4 rounded-full`} 
                      style={{ width: `${(punchedCount / 12) * 100}%` }}
                    ></div>
                  </div>
                  <p className="text-base md:text-xl font-medium text-gray-500">{punchedCount} / 12 已解鎖</p>
                </button>
              );
            })}
          </div>
        </div>
      );
    }

              <span className="text-5xl md:text-6xl">{themeData.icon}</span> 
              {themeData.name}戳戳樂
            </h2>
            <p className="text-gray-600 mt-4 text-xl md:text-2xl font-medium">點擊不同題型牌卡，看看裡面藏著什麼健康知識！</p>
          </div>

          {isAllPunched && (
            <div className="mb-8 p-6 bg-green-100 text-green-800 rounded-2xl border-2 border-green-300 font-bold text-2xl md:text-3xl animate-bounce shadow-md">
              🎉 恭喜！您已完成「{themeData.name}」的所有衛教挑戰！
            </div>
          )}

          <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4 md:gap-6 bg-white p-6 md:p-8 rounded-[3rem] shadow-2xl border-8 border-gray-200 w-full">
            {punchedState.map((isPunched, idx) => (
              <div 
                key={idx}
                onClick={() => onPunch(idx)}
                className={`
                  w-full aspect-[4/3] rounded-[2rem] cursor-pointer relative
                  flex flex-col items-center justify-center transition-all duration-500
                  ${isPunched 
                    ? 'bg-gray-200 shadow-inner border-4 border-gray-300 transform scale-95' 
                    : `${themeData.color} text-white shadow-xl hover:shadow-2xl hover:scale-[1.03] active:scale-95 border-4 border-white`}
                `}
                style={{
                  backgroundImage: isPunched ? 'linear-gradient(135deg, #e5e7eb 0%, #d1d5db 100%)' : 'none',
                }}
              >
                {isPunched ? (
                  <div className="text-gray-400 text-opacity-80 font-black text-2xl md:text-3xl tracking-widest rotate-[-10deg]">已翻開</div>
                ) : (
                  <div className="flex flex-col items-center justify-center drop-shadow-md p-2">
                    <span className="text-5xl md:text-7xl font-black">{idx + 1}</span>
                    <span className="text-sm md:text-xl mt-2 md:mt-3 bg-white bg-opacity-20 px-3 md:px-4 py-1 md:py-2 rounded-xl font-bold tracking-wide border border-white border-opacity-30 text-center leading-tight">
                      {Q_TYPES[questions[idx].type]}
                    </span>
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ==========================================
    // 5. 子元件：題目與衛教彈出視窗
    // ==========================================
    function QuestionModal({ themeColor, questionData, onClose }) {
      const [userAnswer, setUserAnswer] = useState('');
      const [userMultiAnswer, setUserMultiAnswer] = useState([]);
      const [matchPairs, setMatchPairs] = useState([]); 
      const [activeLeft, setActiveLeft] = useState(null);
      const [activeRight, setActiveRight] = useState(null);
      const [userOrder, setUserOrder] = useState([]);
      const [showResult, setShowResult] = useState(false);
      const [isCorrect, setIsCorrect] = useState(false);

      const qType = questionData.type;
      const isSubjective = ['DESIGN', 'DISCUSS', 'ERROR'].includes(qType);

      const shuffledMatchOptions = useMemo(() => {
        if (qType !== 'MATCH') return [];
        return [...questionData.options].sort(() => Math.random() - 0.5);
      }, [questionData]);

      const orderOptions = questionData.options;

      useEffect(() => {
        if (activeLeft && activeRight) {
          setMatchPairs(prev => [
            ...prev.filter(p => p.left !== activeLeft && p.right !== activeRight),
            { left: activeLeft, right: activeRight }
          ]);
          setActiveLeft(null);
          setActiveRight(null);
        }
      }, [activeLeft, activeRight]);

      const handleMatchClick = (side, val) => {
        if (side === 'left') {
          const isMatched = matchPairs.find(p => p.left === val);
          if (isMatched && activeLeft !== val) {
             setMatchPairs(prev => prev.filter(p => p.left !== val));
          }
          setActiveLeft(val === activeLeft ? null : val);
        } else {
          const isMatched = matchPairs.find(p => p.right === val);
          if (isMatched && activeRight !== val) {
             setMatchPairs(prev => prev.filter(p => p.right !== val));
          }
          setActiveRight(val === activeRight ? null : val);
        }
      };

      const handleSubmit = () => {
        let correct = false;

        if (qType === 'TF' || qType === 'MCQ' || qType === 'TABLE' || qType === 'DIALOGUE') {
          correct = userAnswer === questionData.answer;
        } else if (qType === 'RIDDLE' || qType === 'FILL') {
          correct = questionData.answerKeywords.some(kw => userAnswer.includes(kw));
        } else if (qType === 'MULTI') {
          const sortedUser = [...userMultiAnswer].sort();
          const sortedAns = [...questionData.answer].sort();
          correct = JSON.stringify(sortedUser) === JSON.stringify(sortedAns);
        } else if (qType === 'MATCH') {
          const allMatched = Object.keys(questionData.pairs).every(key => {
            const pair = matchPairs.find(p => p.left === key);
            return pair && pair.right === questionData.pairs[key];
          });
          correct = allMatched && matchPairs.length === Object.keys(questionData.pairs).length;
        } else if (qType === 'ORDER') {
          correct = JSON.stringify(userOrder) === JSON.stringify(questionData.answer);
        } else if (isSubjective) {
          correct = userAnswer.trim().length > 0 || qType === 'ERROR'; 
        }

        setIsCorrect(correct);
        setShowResult(true);
      };

      const renderInputArea = () => {
        switch (qType) {
          case 'DIALOGUE':
            return (
              <div className="flex flex-col gap-4 md:gap-8 mt-2">
                <div className="flex items-start gap-3 md:gap-6 bg-blue-50 p-4 md:p-8 rounded-[2rem] rounded-tl-none border-4 border-blue-100 shadow-sm relative">
                  <div className="w-12 h-12 md:w-20 md:h-20 rounded-full bg-blue-200 flex items-center justify-center text-3xl md:text-5xl flex-shrink-0 shadow-md border-4 border-white">
                    🗣️
                  </div>
                  <div className="flex-1">
                    <p className="font-black text-blue-600 text-base md:text-2xl mb-1 md:mb-2">{questionData.dialogue.speaker} 說：</p>
                    <p className="text-xl md:text-4xl font-bold text-gray-800 leading-relaxed md:leading-loose">
                      「{questionData.dialogue.text}」
                    </p>
                  </div>
                </div>
                <div className="flex flex-col gap-3 md:gap-4 mt-2">
                  <p className="text-lg md:text-3xl text-gray-500 font-bold flex items-center gap-2">
                    <span>💭</span> 你會怎麼回答？
                  </p>
                  {questionData.options.map(opt => (
                    <label key={opt} className={`p-4 md:p-6 rounded-2xl border-4 cursor-pointer transition-all duration-200 flex items-center gap-3 md:gap-6 ${userAnswer === opt ? `${themeColor} text-white border-transparent shadow-xl transform scale-[1.02]` : 'bg-white border-gray-200 hover:bg-gray-50'}`}>
                      <input 
                        type="radio" 
                        name="dialogue_mcq" 
                        value={opt} 
                        checked={userAnswer === opt}
                        onChange={(e) => setUserAnswer(e.target.value)}
                        className="hidden"
                      />
                      <div className={`w-6 h-6 md:w-10 md:h-10 rounded-full border-4 flex-shrink-0 flex items-center justify-center transition-colors ${userAnswer === opt ? 'border-white' : 'border-gray-300'}`}>
                         {userAnswer === opt && <div className="w-2.5 h-2.5 md:w-4 md:h-4 bg-white rounded-full"></div>}
                      </div>
                      <span className="font-bold text-lg md:text-3xl leading-relaxed">{opt}</span>
                    </label>
                  ))}
                </div>
              </div>
            );

          case 'TF':
          case 'MCQ':
          case 'TABLE': 
            return (
              <div className="flex flex-col gap-4 md:gap-6">
                {qType === 'TABLE' && (
                  <div className="overflow-x-auto bg-white rounded-2xl border-4 border-gray-200 shadow-sm mb-2 md:mb-4">
                    <table className="w-full text-left text-base md:text-2xl border-collapse min-w-[300px]">
                      <thead className="bg-blue-50 border-b-4 border-blue-200 text-blue-900">
                        <tr>
                          {questionData.tableData.headers.map((h, i) => (
                            <th key={i} className="p-3 md:p-5 font-black whitespace-nowrap">{h}</th>
                          ))}
                        </tr>
                      </thead>
                      <tbody>
                        {questionData.tableData.rows.map((row, idx) => (
                          <tr key={idx} className="border-b-2 border-gray-100 last:border-0 hover:bg-gray-50">
                            {row.map((cell, i) => (
                              <td key={i} className="p-3 md:p-5 font-bold text-gray-700">{cell}</td>
                            ))}
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                )}
                
                <div className="flex flex-col gap-3 md:gap-4">
                  {questionData.options.map(opt => (
                    <label key={opt} className={`p-4 md:p-6 rounded-2xl border-4 cursor-pointer transition-colors ${userAnswer === opt ? `${themeColor} text-white border-transparent shadow-lg` : 'bg-gray-50 border-gray-200 hover:bg-gray-100'}`}>
                      <input 
                        type="radio" 
                        name="mcq" 
                        value={opt} 
                        checked={userAnswer === opt}
                        onChange={(e) => setUserAnswer(e.target.value)}
                        className="hidden"
                      />
                      <span className="font-bold text-xl md:text-3xl">{opt}</span>
                    </label>
                  ))}
                </div>
              </div>
            );

          case 'MULTI':
            return (
              <div className="flex flex-col gap-3 md:gap-4">
                {questionData.options.map(opt => {
                  const isChecked = userMultiAnswer.includes(opt);
                  return (
                    <label key={opt} className={`p-4 md:p-6 rounded-2xl border-4 cursor-pointer transition-colors flex items-center gap-3 md:gap-6 ${isChecked ? 'bg-blue-50 border-blue-400 shadow-lg' : 'bg-gray-50 border-gray-200 hover:bg-gray-100'}`}>
                      <input 
                        type="checkbox" 
                        checked={isChecked}
                        onChange={(e) => {
                          if (e.target.checked) setUserMultiAnswer([...userMultiAnswer, opt]);
                          else setUserMultiAnswer(userMultiAnswer.filter(item => item !== opt));
                        }}
                        className="w-6 h-6 md:w-10 md:h-10 rounded-md md:rounded-lg text-blue-600 focus:ring-blue-500 flex-shrink-0"
                      />
                      <span className="font-bold text-xl md:text-3xl">{opt}</span>
                    </label>
                  );
                })}
              </div>
            );

          case 'FILL':
          case 'RIDDLE':
            return (
              <input 
                type="text" 
                value={userAnswer}
                onChange={(e) => setUserAnswer(e.target.value)}
                placeholder="請輸入您的答案..."
                className="w-full p-4 md:p-8 text-xl md:text-4xl border-4 border-gray-300 rounded-2xl focus:border-blue-500 focus:ring-4 focus:ring-blue-200 outline-none font-bold"
              />
            );

          case 'MATCH':
            const MATCH_COLORS = ['bg-pink-200 border-pink-400', 'bg-cyan-200 border-cyan-400', 'bg-lime-200 border-lime-400', 'bg-amber-200 border-amber-400'];
            return (
              <div className="flex flex-col gap-4 md:gap-6">
                <p className="text-base md:text-2xl font-bold text-gray-600 bg-gray-100 p-3 md:p-5 rounded-xl flex items-center gap-2 md:gap-3 border-2 border-gray-200">
                  <span className="text-xl md:text-3xl">👉</span> 請分別點擊左右兩側的項目，將它們配對連線：
                </p>
                <div className="flex flex-col md:flex-row justify-between gap-4 md:gap-8">
                  <div className="flex-1 flex flex-col gap-3 md:gap-4">
                    {Object.keys(questionData.pairs).map((key, index) => {
                      const matchIdx = matchPairs.findIndex(p => p.left === key);
                      const isMatched = matchIdx !== -1;
                      const isActive = activeLeft === key;
                      let colorClass = 'bg-gray-50 border-gray-300 hover:bg-gray-100';
                      
                      if (isMatched) colorClass = MATCH_COLORS[matchIdx % MATCH_COLORS.length];
                      else if (isActive) colorClass = 'bg-blue-100 border-blue-500 shadow-lg transform scale-[1.02]';

                      return (
                        <button key={key} onClick={() => handleMatchClick('left', key)} className={`p-3 md:p-5 border-4 rounded-xl md:rounded-2xl text-left font-bold transition-all duration-200 text-lg md:text-3xl flex items-center gap-2 md:gap-4 ${colorClass}`}>
                          <span className="bg-white border-2 border-gray-300 text-gray-600 w-8 h-8 md:w-12 md:h-12 flex items-center justify-center rounded-lg md:rounded-xl text-lg md:text-2xl flex-shrink-0 shadow-sm font-black">
                            {index + 1}
                          </span>
                          {isMatched && <span className="inline-block px-2 py-0.5 md:px-3 md:py-1 bg-white bg-opacity-80 rounded-md md:rounded-lg text-sm md:text-2xl text-gray-800 shadow-md flex-shrink-0">連線 {matchIdx + 1}</span>}
                          <span className="flex-1 leading-snug">{key}</span>
                        </button>
                      );
                    })}
                  </div>
                  <div className="flex-1 flex flex-col gap-3 md:gap-4">
                    {shuffledMatchOptions.map((opt, index) => {
                      const matchIdx = matchPairs.findIndex(p => p.right === opt);
                      const isMatched = matchIdx !== -1;
                      const isActive = activeRight === opt;
                      let colorClass = 'bg-gray-50 border-gray-300 hover:bg-gray-100';
                      
                      if (isMatched) colorClass = MATCH_COLORS[matchIdx % MATCH_COLORS.length];
                      else if (isActive) colorClass = 'bg-blue-100 border-blue-500 shadow-lg transform scale-[1.02]';

                      return (
                        <button key={opt} onClick={() => handleMatchClick('right', opt)} className={`p-3 md:p-5 border-4 rounded-xl md:rounded-2xl text-left font-bold transition-all duration-200 text-lg md:text-3xl flex items-center gap-2 md:gap-4 ${colorClass}`}>
                          <span className="bg-white border-2 border-gray-300 text-gray-600 w-8 h-8 md:w-12 md:h-12 flex items-center justify-center rounded-lg md:rounded-xl text-lg md:text-2xl flex-shrink-0 shadow-sm font-black">
                            {String.fromCharCode(65 + index)}
                          </span>
                          {isMatched && <span className="inline-block px-2 py-0.5 md:px-3 md:py-1 bg-white bg-opacity-80 rounded-md md:rounded-lg text-sm md:text-2xl text-gray-800 shadow-md flex-shrink-0">連線 {matchIdx + 1}</span>}
                          <span className="flex-1 leading-snug">{opt}</span>
                        </button>
                      );
                    })}
                  </div>
                </div>
              </div>
            );

          case 'ORDER':
            return (
              <div className="flex flex-col gap-4 md:gap-6">
                <p className="text-base md:text-2xl font-bold text-gray-600 bg-gray-100 p-3 md:p-5 rounded-xl flex items-center gap-2 md:gap-3 border-2 border-gray-200">
                  <span className="text-xl md:text-3xl">👆</span> 請依照正確順序，依序點擊下方的選項：
                </p>
                <div className="flex flex-col gap-3 md:gap-4">
                  {orderOptions.map((opt, index) => {
                    const orderIndex = userOrder.indexOf(opt);
                    const isSelected = orderIndex !== -1;
                    return (
                      <button 
                        key={opt}
                        onClick={() => {
                          if (isSelected) {
                            setUserOrder(userOrder.filter(item => item !== opt));
                          } else {
                            setUserOrder([...userOrder, opt]);
                          }
                        }}
                        className={`relative p-3 md:p-5 border-4 rounded-xl md:rounded-2xl text-left font-bold transition-all duration-200 text-lg md:text-3xl flex items-center gap-3 md:gap-5 ${isSelected ? 'bg-blue-100 border-blue-500 shadow-lg' : 'bg-gray-50 border-gray-300 hover:bg-gray-100'}`}
                      >
                        <div className={`w-8 h-8 md:w-12 md:h-12 flex-shrink-0 flex items-center justify-center rounded-full border-4 font-black text-lg md:text-2xl transition-colors ${isSelected ? 'bg-blue-600 border-blue-600 text-white shadow-md' : 'bg-white border-gray-300 text-transparent'}`}>
                          {isSelected ? orderIndex + 1 : ''}
                        </div>
                        <span className="bg-gray-200 text-gray-600 w-8 h-8 md:w-12 md:h-12 flex items-center justify-center rounded-lg md:rounded-xl flex-shrink-0 text-lg md:text-2xl font-black shadow-inner">
                          {index + 1}
                        </span>
                        <span className="flex-1 leading-snug">{opt}</span>
                      </button>
                    );
                  })}
                </div>
                {userOrder.length > 0 && (
                   <button onClick={() => setUserOrder([])} className="self-end text-base md:text-xl text-gray-500 hover:text-red-500 font-bold underline">重新排序</button>
                )}
              </div>
            );

          case 'DESIGN':
          case 'DISCUSS':
          case 'ERROR':
            return (
              <div className="flex flex-col gap-2 md:gap-3">
                {qType === 'ERROR' && <p className="text-base md:text-2xl text-gray-500 font-bold bg-gray-100 p-3 md:p-4 rounded-xl border-2 border-gray-200">※ 找錯題可直接在心裡想好答案後，點擊下方「確認送出」看解析。</p>}
                <textarea 
                  value={userAnswer}
                  onChange={(e) => setUserAnswer(e.target.value)}
                  placeholder="請寫下您的想法..."
                  rows="4"
                  className="w-full p-4 md:p-8 text-xl md:text-3xl border-4 border-gray-300 rounded-2xl focus:border-blue-500 focus:ring-4 focus:ring-blue-200 outline-none resize-none font-medium"
                ></textarea>
              </div>
            );

          default:
            return null;
        }
      };

      return (
        <div className="fixed inset-0 bg-black bg-opacity-70 z-50 flex items-center justify-center p-2 md:p-8 backdrop-blur-sm">
          <div className="bg-white rounded-2xl md:rounded-[2rem] w-full max-w-5xl overflow-hidden shadow-2xl animate-fade-in-up flex flex-col max-h-[95vh] md:max-h-[90vh]">
            
            <div className={`${themeColor} p-4 md:p-6 text-white flex justify-between items-center shadow-md z-10`}>
              <span className="bg-white bg-opacity-25 px-4 py-1.5 md:px-5 md:py-3 rounded-full text-base md:text-2xl font-black tracking-widest border border-white border-opacity-30">
                {Q_TYPES[qType]}
              </span>
              <button onClick={onClose} className="text-white hover:text-gray-200 text-3xl md:text-5xl font-bold leading-none w-10 h-10 flex items-center justify-center">&times;</button>
            </div>

            <div className="p-4 md:p-10 overflow-y-auto flex-1">
              {!showResult ? (
                <div className="space-y-6 md:space-y-8">
                  <h3 className="text-2xl md:text-4xl font-bold leading-relaxed md:leading-loose text-gray-800 bg-gray-50 p-4 md:p-8 rounded-2xl border-l-8 border-gray-800 shadow-sm">
                    {questionData.question}
                  </h3>
                  
                  <div className="mt-4 md:mt-8">
                    {renderInputArea()}
                  </div>

                  <button 
                    onClick={handleSubmit}
                    className="w-full mt-6 md:mt-10 bg-gray-800 hover:bg-black text-white text-2xl md:text-4xl font-bold py-4 md:py-8 rounded-2xl transition-all shadow-xl hover:shadow-2xl transform hover:-translate-y-1"
                  >
                    確認送出
                  </button>
                </div>
              ) : (
                <div className="space-y-6 md:space-y-8 animate-fade-in">
                  {isSubjective ? (
                    <div className="bg-blue-100 border-l-[8px] md:border-l-[12px] border-blue-500 p-5 md:p-8 rounded-r-2xl shadow-sm">
                      <h4 className="text-2xl md:text-4xl font-black text-blue-800 mb-2 md:mb-4">💡 {qType === 'ERROR' ? '來看看這段話錯在哪裡！' : '感謝您的分享！'}</h4>
                      <p className="text-lg md:text-3xl font-bold text-blue-900 leading-relaxed">{qType === 'ERROR' ? '這段敘述中藏著一些常見的錯誤迷思：' : '您的思考方向很棒，讓我們來看看專業的衛教建議：'}</p>
                    </div>
                  ) : isCorrect ? (
                    <div className="bg-green-100 border-l-[8px] md:border-l-[12px] border-green-500 p-5 md:p-8 rounded-r-2xl shadow-sm flex items-center gap-3 md:gap-4">
                      <span className="text-4xl md:text-6xl">✅</span>
                      <h4 className="text-2xl md:text-5xl font-black text-green-800">答對了！非常棒！</h4>
                    </div>
                  ) : (
                    <div className="bg-red-100 border-l-[8px] md:border-l-[12px] border-red-500 p-5 md:p-8 rounded-r-2xl shadow-sm">
                      <div className="flex items-center gap-3 md:gap-4 mb-3 md:mb-4">
                        <span className="text-4xl md:text-6xl">❌</span>
                        <h4 className="text-2xl md:text-5xl font-black text-red-800">答錯囉！再接再厲！</h4>
                      </div>
                      {qType !== 'MATCH' && <p className="text-red-900 font-bold text-lg md:text-3xl mt-2 md:mt-4 bg-white bg-opacity-50 p-3 md:p-4 rounded-xl inline-block">正確答案是：{
                        Array.isArray(questionData.answer) ? questionData.answer.join('、') : questionData.answer
                      }</p>}
                    </div>
                  )}

                  {qType === 'ERROR' && (
                    <div className="bg-white border-4 border-gray-200 p-5 md:p-8 rounded-2xl md:rounded-[2rem] shadow-md my-6 md:my-8">
                      <h4 className="text-xl md:text-3xl font-black text-gray-800 mb-4 md:mb-6 flex items-center gap-2 md:gap-3">
                        <span className="text-3xl md:text-4xl">🕵️</span> 找錯解析與修正
                      </h4>
                      <div className="text-xl md:text-3xl leading-[2] md:leading-[3] break-words bg-gray-50 p-4 md:p-8 rounded-xl md:rounded-2xl border-2 border-gray-100">
                        {questionData.correctionData.map((part, i) => (
                          part.isError ? (
                            <span key={i} className="inline-flex items-center flex-wrap mx-1 md:mx-2 my-1 md:my-2">
                              <span className="line-through text-red-600 bg-red-100 px-2 md:px-3 py-1 rounded-lg font-bold border border-red-200">{part.text}</span>
                              <span className="text-red-600 mx-2 md:mx-3 font-black text-2xl md:text-3xl">➔</span>
                              <span className="text-green-800 font-black bg-green-200 px-3 md:px-4 py-1.5 md:py-2 rounded-lg shadow-sm border-2 border-green-400">{part.correction}</span>
                            </span>
                          ) : (
                            <span key={i} className="text-gray-800 font-bold">{part.text}</span>
                          )
                        ))}
                      </div>
                    </div>
                  )}

                  <div className="bg-amber-50 border-4 border-amber-300 rounded-2xl md:rounded-[2rem] p-6 md:p-10 shadow-lg mt-6 md:mt-8">
                    <h4 className="text-2xl md:text-4xl font-black text-amber-900 mb-4 md:mb-6 flex items-center gap-3 md:gap-4">
                      <span className="text-4xl md:text-5xl">📚</span> 衛教百寶箱
                    </h4>
                    <p className="text-xl md:text-[1.75rem] text-gray-900 leading-relaxed md:leading-loose font-bold tracking-wide">
                      {questionData.knowledge.replace('【衛教知識】', '')}
                    </p>
                  </div>

                  <button 
                    onClick={onClose}
                    className={`w-full mt-6 md:mt-10 ${themeColor} text-white text-2xl md:text-4xl font-black py-4 md:py-8 rounded-2xl transition-all shadow-xl hover:shadow-2xl transform hover:-translate-y-1`}
                  >
                    收下知識，關閉視窗
                  </button>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // 初始化並渲染應用程式
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
